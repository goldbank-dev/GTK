steps:
  # 1. Build da imagem Docker (API + Dashboard)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/backend/gtk-api:$COMMIT_SHA'
      - '-t'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/backend/gtk-api:latest'
      - '.'

  # 2. Push para Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/backend/gtk-api'

  # 3. Deploy para Cloud Run (southamerica-east1 = São Paulo)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gtk-api'
      - '--image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/backend/gtk-api:$COMMIT_SHA'
      - '--region=southamerica-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--cpu-boost'
      - '--set-secrets=DEPLOYER_PK=gtk-deployer-private-key:latest,JWT_SECRET=gtk-jwt-secret:latest,ASAAS_API_KEY=gtk-asaas-api-key:latest,ENCRYPTION_KEY=gtk-encryption-key:latest,MAINNET_RPC=gtk-alchemy-mainnet-rpc:latest,BANK_PRIVATE_KEY=gtk-bank-operator-key:latest,API_KEY=gtk-api-key:latest,DATABASE_URL=gtk-db-connection-string:latest'
      - '--set-env-vars=^|^NODE_ENV=production|NETWORK=mainnet|GTK_TOKEN_ADDRESS=0x8751264B0f82cfE5DD3ad941b4d28FD7a0f896EA|GTK_BANK_ADDRESS=0xcF1870caF85bF28072d0aD3E7ef3D8620D48a204|GTK_ORACLE_ADDRESS=0x2167964CB20Dd614d644F2B2079461DA5e4E5797|USDT_ADDRESS=0xdAC17F958D2ee523a2206206994597C13D831ec7|ALLOWED_ORIGINS=https://goldbank.com.br,https://www.goldbank.com.br,https://app.goldbank.com.br,https://goldbank.app'
      - '--add-cloudsql-instances=gtk-bank-prod:southamerica-east1:gtk-db'

images:
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/backend/gtk-api:$COMMIT_SHA'
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/backend/gtk-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
